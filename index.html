<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Password Compliance System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

.page{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    animation:fadeIn 0.6s ease;
}

.active{
    display:flex;
}

input,button{
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.strength-bar{
    height:10px;
    background:#334155;
    border-radius:5px;
    overflow:hidden;
}
#strength{
    height:100%;
    width:0%;
    background:red;
    transition:0.5s;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes pulseRed{
  0%{box-shadow:0 0 10px red;}
  50%{box-shadow:0 0 25px red;}
  100%{box-shadow:0 0 10px red;}
}

.alert{
    animation:pulseRed 1s infinite;
    border:2px solid red;
}

canvas{
    margin-top:20px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="page active" id="loginPage">
    <div class="card">
        <h2>🔐 Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button onclick="showPage('compliancePage')">Login</button>
    </div>
</div>

<!-- COMPLIANCE PAGE -->
<div class="page" id="compliancePage">
    <div class="card">
        <h2>Password Compliance Checker</h2>
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="checkCompliance()">Check</button>

        <div class="strength-bar">
            <div id="strength"></div>
        </div>

        <div id="complianceResult"></div>
        <button onclick="showPage('riskPage')">Proceed to Risk</button>
    </div>
</div>

<!-- RISK PAGE -->
<div class="page" id="riskPage">
    <div class="card" id="riskCard">
        <h2>Risk Evaluation</h2>
        <h3 id="riskScore">0</h3>
        <p id="riskLevel"></p>
        <button onclick="generateReport()">Generate Report</button>
    </div>
</div>

<!-- REPORT PAGE -->
<div class="page" id="reportPage">
    <div class="card">
        <h2>Graphical Report</h2>
        <canvas id="pieChart" width="300" height="200"></canvas>
        <canvas id="barChart" width="300" height="200"></canvas>
    </div>
</div>

<script>

let complianceStatus=false;
let violationCount=0;
let riskScore=0;

function showPage(pageId){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}

function checkCompliance(){
    let pwd=document.getElementById("password").value;
    let score=0;
    violationCount=0;

    if(pwd.length>=8){score+=20;}else{violationCount++;}
    if(/[A-Z]/.test(pwd)){score+=20;}else{violationCount++;}
    if(/[a-z]/.test(pwd)){score+=20;}else{violationCount++;}
    if(/[0-9]/.test(pwd)){score+=20;}else{violationCount++;}
    if(/[^A-Za-z0-9]/.test(pwd)){score+=20;}else{violationCount++;}

    document.getElementById("strength").style.width=score+"%";
    document.getElementById("strength").style.background=
        score<40?"red":score<80?"orange":"green";

    complianceStatus = score>=80;

    document.getElementById("complianceResult").innerHTML=
        "Strength Score: "+score+"/100<br>"+
        "Status: "+(complianceStatus?"✅ Compliant":"❌ Non-Compliant");

    calculateRisk();
}

function calculateRisk(){
    riskScore=violationCount*20;
    let level="";
    let card=document.getElementById("riskCard");

    if(riskScore<30){level="Low Risk";}
    else if(riskScore<70){level="Medium Risk";}
    else{
        level="HIGH RISK ⚠";
        card.classList.add("alert");
    }

    document.getElementById("riskScore").innerText="Risk Score: "+riskScore;
    document.getElementById("riskLevel").innerText=level;
}

function generateReport(){
    showPage("reportPage");

    new Chart(document.getElementById("pieChart"),{
        type:"pie",
        data:{
            labels:["Compliant","Non-Compliant"],
            datasets:[{
                data:[complianceStatus?1:0, complianceStatus?0:1],
                backgroundColor:["green","red"]
            }]
        }
    });

    new Chart(document.getElementById("barChart"),{
        type:"bar",
        data:{
            labels:["Violations"],
            datasets:[{
                label:"Violation Count",
                data:[violationCount],
                backgroundColor:"orange"
            }]
        }
    });
}

</script>

</body>
</html>
