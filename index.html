<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Automated Password Policy Compliance System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

.page{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    animation:fade 0.5s ease;
}

.active{display:flex;}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:400px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

input,button{
    padding:10px;
    margin:8px;
    border-radius:6px;
    border:none;
    outline:none;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
button:hover{transform:scale(1.05);}

.strength-bar{
    height:10px;
    background:#334155;
    border-radius:5px;
    overflow:hidden;
}
#strength{
    height:100%;
    width:0%;
    background:red;
    transition:0.5s;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes pulseRed{
  0%{box-shadow:0 0 10px red;}
  50%{box-shadow:0 0 25px red;}
  100%{box-shadow:0 0 10px red;}
}

.alert{
    border:2px solid red;
    animation:pulseRed 1s infinite;
}

canvas{margin-top:20px;}
</style>
</head>

<body>

<!-- PAGE 1: COMPLIANCE -->
<div class="page active" id="compliancePage">
<div class="card">
<h2>Password Policy Compliance Checker</h2>
<input type="password" id="password" placeholder="Enter Password">
<button onclick="validatePassword()">Validate</button>

<div class="strength-bar">
<div id="strength"></div>
</div>

<div id="output"></div>

<button onclick="goToRisk()">Proceed to Risk Evaluation</button>
</div>
</div>

<!-- PAGE 2: RISK -->
<div class="page" id="riskPage">
<div class="card" id="riskCard">
<h2>Risk Evaluation Module</h2>
<h3 id="riskScore"></h3>
<p id="riskLevel"></p>
<p id="riskExplanation"></p>
<button onclick="goToReport()">Generate Report</button>
</div>
</div>

<!-- PAGE 3: REPORT -->
<div class="page" id="reportPage">
<div class="card">
<h2>Graphical Report</h2>
<canvas id="pieChart"></canvas>
<canvas id="barChart"></canvas>
</div>
</div>

<script>

let violations = {};
let violationCount = 0;
let entropy = 0;
let strengthScore = 0;
let complianceStatus = false;
let riskScore = 0;

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function validatePassword(){
let pwd = document.getElementById("password").value;
violations = {length:0,upper:0,lower:0,digit:0,special:0};
violationCount = 0;

if(pwd.length < 8){violations.length=1; violationCount++;}
if(!/[A-Z]/.test(pwd)){violations.upper=1; violationCount++;}
if(!/[a-z]/.test(pwd)){violations.lower=1; violationCount++;}
if(!/[0-9]/.test(pwd)){violations.digit=1; violationCount++;}
if(!/[^A-Za-z0-9]/.test(pwd)){violations.special=1; violationCount++;}

// ENTROPY CALCULATION
let charsetSize = 0;
if(/[a-z]/.test(pwd)) charsetSize += 26;
if(/[A-Z]/.test(pwd)) charsetSize += 26;
if(/[0-9]/.test(pwd)) charsetSize += 10;
if(/[^A-Za-z0-9]/.test(pwd)) charsetSize += 32;

entropy = pwd.length * Math.log2(charsetSize || 1);
entropy = entropy.toFixed(2);

// STRENGTH SCORE
strengthScore = 100 - (violationCount * 15);
if(entropy < 40) strengthScore -= 20;
if(strengthScore < 0) strengthScore = 0;

document.getElementById("strength").style.width = strengthScore + "%";
document.getElementById("strength").style.background =
strengthScore<40?"red":strengthScore<70?"orange":"green";

complianceStatus = (violationCount === 0 && entropy >= 40);

let message = complianceStatus ?
"🟢 This password is secure according to policy." :
"🔴 This password does NOT meet the required security policy.";

document.getElementById("output").innerHTML =
"Entropy: "+entropy+" bits<br>"+
"Strength Score: "+strengthScore+"/100<br>"+
"Violation Count: "+violationCount+"<br>"+
"Compliance: "+(complianceStatus?"PASS":"FAIL")+"<br><br>"+message;
}

function goToRisk(){
calculateRisk();
showPage("riskPage");
}

function calculateRisk(){
riskScore = violationCount * 20;
if(entropy < 40) riskScore += 20;

let level="";
let explanation="";
let card=document.getElementById("riskCard");
card.classList.remove("alert");

if(riskScore <=30){
level="Low Risk";
explanation="Password follows most security standards.";
}
else if(riskScore <=70){
level="Medium Risk";
explanation="Password has moderate vulnerabilities.";
}
else{
level="HIGH RISK ⚠";
explanation="Password is vulnerable to brute-force or dictionary attacks.";
card.classList.add("alert");
}

document.getElementById("riskScore").innerText="Risk Score: "+riskScore;
document.getElementById("riskLevel").innerText=level;
document.getElementById("riskExplanation").innerText=explanation;
}

function goToReport(){
showPage("reportPage");

new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:["Compliant","Non-Compliant"],
datasets:[{
data:[complianceStatus?1:0, complianceStatus?0:1],
backgroundColor:["green","red"]
}]
}
});

new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["Length","Uppercase","Lowercase","Digit","Special"],
datasets:[{
label:"Violations",
data:[
violations.length,
violations.upper,
violations.lower,
violations.digit,
violations.special
],
backgroundColor:"orange"
}]
}
});
}

</script>

</body>
</html>
